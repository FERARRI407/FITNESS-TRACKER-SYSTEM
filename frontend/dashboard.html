<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
nav { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: #1a1a1a; border-bottom: 1px solid #00ff88; margin-bottom: 30px; border-radius: 10px; }
nav a { color: #00ff88; text-decoration: none; margin-left: 16px; }
h1 { color: #00ff88; margin-bottom: 24px; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 30px; }
.stat-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 24px; text-align: center; }
.stat-card .icon { font-size: 36px; margin-bottom: 8px; }
.stat-card .number { font-size: 32px; font-weight: bold; color: #00ff88; }
.stat-card .label { color: #888; margin-top: 4px; }
.card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
.activity-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #222; }
.activity-item:last-child { border-bottom: none; }
.badge { background: #003322; color: #00ff88; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
</style>
</head>
<body>
<nav>
  <span style="color:#00ff88; font-weight:bold;">📊 Fitness Tracker</span>
  <div>
    <a href="index.html">Home</a>
    <a href="workouts.html">Workouts</a>
    <a href="goals.html">Goals</a>
    <a href="register.html">Login</a>
  </div>
</nav>

<h1>📊 My Dashboard</h1>

<!-- Stat Cards -->
<div class="stats-grid">
  <div class="stat-card">
    <div class="icon">💪</div>
    <div class="number" id="total_workouts">-</div>
    <div class="label">Total Workouts</div>
  </div>
  <div class="stat-card">
    <div class="icon">🔥</div>
    <div class="number" id="total_calories">-</div>
    <div class="label">Calories Burned</div>
  </div>
  <div class="stat-card">
    <div class="icon">🎯</div>
    <div class="number" id="total_goals">-</div>
    <div class="label">Active Goals</div>
  </div>
  <div class="stat-card">
    <div class="icon">⏱️</div>
    <div class="number" id="total_minutes">-</div>
    <div class="label">Total Minutes</div>
  </div>
</div>

<!-- Recent Workouts -->
<div class="card">
  <h2 style="color:#00ff88; margin-bottom:16px;">🕐 Recent Workouts</h2>
  <div id="recent_workouts">
    <p style="color:#888;">Loading...</p>
  </div>
</div>

<!-- Recent Goals -->
<div class="card">
  <h2 style="color:#00ff88; margin-bottom:16px;">🎯 Recent Goals</h2>
  <div id="recent_goals">
    <p style="color:#888;">Loading...</p>
  </div>
</div>

<script>
const API = "https://fitness-tracker-system-production.up.railway.app";
const token = localStorage.getItem('token');

async function loadDashboard() {
  try {
    // Load workouts
    const wRes = await fetch(`${API}/workouts`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const workouts = await wRes.json();

    document.getElementById('total_workouts').textContent = workouts.length || 0;
    document.getElementById('total_calories').textContent = 
      workouts.reduce((sum, w) => sum + (w.calories_burned || 0), 0);
    document.getElementById('total_minutes').textContent = 
      workouts.reduce((sum, w) => sum + (w.duration_minutes || 0), 0);

    // Recent workouts
    const recent = workouts.slice(-5).reverse();
    document.getElementById('recent_workouts').innerHTML = recent.length ? 
      recent.map(w => `
        <div class="activity-item">
          <span>💪 ${w.workout_type}</span>
          <span>${w.duration_minutes} mins</span>
          <span class="badge">${w.calories_burned} kcal</span>
          <span style="color:#888">${w.workout_date}</span>
        </div>
      `).join('') : 
      '<p style="color:#888;">No workouts yet!</p>';

  } catch(e) {
    document.getElementById('recent_workouts').innerHTML = 
      '<p style="color:#ff4444;">Could not load workouts</p>';
  }

  try {
    // Load goals
    const gRes = await fetch(`${API}/goals`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const goals = await gRes.json();

    document.getElementById('total_goals').textContent = goals.length || 0;

    document.getElementById('recent_goals').innerHTML = goals.length ?
      goals.slice(-3).map(g => {
        const percent = Math.min(Math.round((g.current_progress / g.target_value) * 100), 100);
        return `
          <div class="activity-item">
            <span>🎯 ${g.goal_name}</span>
            <span class="badge">${percent}% complete</span>
            <span style="color:#888">Due: ${g.deadline}</span>
          </div>
        `;
      }).join('') :
      '<p style="color:#888;">No goals yet!</p>';

  } catch(e) {
    document.getElementById('recent_goals').innerHTML = 
      '
