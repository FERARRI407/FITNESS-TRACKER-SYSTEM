<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Goals - Fitness Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <header>
    <div class="brand"><div class="logo">FT</div><div>Fitness Tracker</div></div>
    <nav><a href="/">Home</a><a href="dashboard.html">Dashboard</a><a href="workouts.html">Workouts</a></nav>
  </header>
  <main class="container">
    <section class="section animate">
      <div class="add-goal">
        <div>
          <h2>Goal Progress</h2>
          <p class="small">Stay on track with goal cards and progress indicators.</p>
        </div>
        <button class="btn btn--primary btn--glow">Add New Goal</button>
      </div>
    </section>

    <section class="section grid grid--3">
      <div class="goal-card">
        <h4>Run 20km</h4>
        <div class="goal-progress"><span>56% complete</span><span>11/20 km</span></div>
        <div class="goal-bar"><div class="goal-fill" style="width:56%"></div></div>
      </div>
      <div class="goal-card">
        <h4>Burn 5,000 kcal</h4>
        <div class="goal-progress"><span>72% complete</span><span>3,600/5,000 kcal</span></div>
        <div class="goal-bar"><div class="goal-fill" style="width:72%"></div></div>
      </div>
      <div class="goal-card">
        <h4>Complete 12 workouts</h4>
        <div class="goal-progress"><span>42% complete</span><span>5/12 sessions</span></div>
        <div class="goal-bar"><div class="goal-fill" style="width:42%"></div></div>
      </div>
    </section>

    <section class="section form animate">
      <h2>Add New Goal</h2>
      <div class="form">
        <div class="form-grid">
          <input type="text" placeholder="Goal Name" />
          <input type="number" placeholder="Target Value" />
          <input type="number" placeholder="Current Progress" />
          <input type="date" />
        </div>
        <div class="form-actions">
          <button class="btn btn--primary btn--glow">Save Goal</button>
          <button class="btn btn--ghost">Clear</button>
        </div>
      </div>
    </section>
  </main>
  <footer class="footer">© 2026 Fitness Tracker | Built with FastAPI</footer>
</body>
</html>
