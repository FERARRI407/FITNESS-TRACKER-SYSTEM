<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register / Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
  <script>const API_BASE = 'https://fitness-tracker-system-production.up.railway.app';</script>
</head>
<body>
  <header>
    <div class="brand"><div class="logo">FT</div><div>Fitness Tracker</div></div>
    <nav><a href="/">Home</a><a href="about.html">About</a></nav>
  </header>
  <main class="container">
    <div class="form card">
      <h2>Register</h2>
      <input id="name" class="input" placeholder="Full name" />
      <input id="email" class="input" placeholder="Email" />
      <input id="password" class="input" type="password" placeholder="Password" />
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn--primary btn--gradient" onclick="registerUser()">Create account</button>
        <button class="btn btn--ghost" onclick="location.href='login.html'">Have an account?</button>
      </div>
      <p class="small">Secure password storage and JWT authentication powered by the backend.</p>
    </div>
  </main>
<script>
async function registerUser(){
  const payload={name:document.getElementById('name').value,email:document.getElementById('email').value,password:document.getElementById('password').value};
  try{const res=await fetch(${API_BASE}/auth/register,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});if(res.ok){alert('Registered');location.href='dashboard.html'}else{const t=await res.json();alert(t.detail||'Error')}}catch(e){alert(e.message)}
}
</script>
</body>
</html>
