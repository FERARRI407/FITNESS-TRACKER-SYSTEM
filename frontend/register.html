<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register - Fitness Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <header>
    <div class="brand"><div class="logo">FT</div><div>Fitness Tracker</div></div>
    <nav><a href="/">Home</a><a href="about.html">About</a><a href="dashboard.html">Dashboard</a></nav>
  </header>
  <main class="container">
    <section class="section animate">
      <div class="form">
        <h2>Create your account</h2>
        <div class="form-grid">
          <input type="text" placeholder="Full name" />
          <input type="email" placeholder="Email address" />
          <input type="password" placeholder="Password" />
          <input type="password" placeholder="Confirm password" />
        </div>
        <div class="form-actions">
          <button class="btn btn--primary btn--glow">Register Now</button>
          <button class="btn btn--ghost">Already have an account?</button>
        </div>
      </div>
    </section>
  </main>
  <footer class="footer">© 2026 Fitness Tracker | Built with FastAPI</footer>
</body>
</html>
