<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register / Login</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.container { background: #1a1a1a; border: 1px solid #00ff88; border-radius: 16px; padding: 40px; width: 400px; }
h2 { color: #00ff88; text-align: center; margin-bottom: 24px; }
input { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; }
button { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
.btn-green { background: #00ff88; color: #111; }
.btn-outline { background: transparent; border: 1px solid #00ff88; color: #00ff88; }
.msg { text-align: center; margin-top: 12px; padding: 10px; border-radius: 8px; }
.success { background: #003322; color: #00ff88; }
.error { background: #330000; color: #ff4444; }
.tabs { display: flex; margin-bottom: 24px; }
.tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-bottom: 2px solid #333; color: #888; }
.tab.active { border-bottom: 2px solid #00ff88; color: #00ff88; }
.form { display: none; }
.form.active { display: block; }
a { color: #00ff88; }
</style>
</head>
<body>
<div class="container">
  <h2>🏋️ Fitness Tracker</h2>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('register')">Register</div>
    <div class="tab" onclick="switchTab('login')">Login</div>
  </div>

  <!-- Register Form -->
  <div class="form active" id="registerForm">
    <input id="reg_name" type="text" placeholder="Full Name">
    <input id="reg_email" type="email" placeholder="Email">
    <input id="reg_password" type="password" placeholder="Password">
    <button class="btn-green" onclick="register()">Create Account</button>
    <div id="reg_msg"></div>
  </div>

  <!-- Login Form -->
  <div class="form" id="loginForm">
    <input id="login_email" type="email" placeholder="Email">
    <input id="login_password" type="password" placeholder="Password">
    <button class="btn-green" onclick="login()">Login</button>
    <div id="login_msg"></div>
  </div>

  <p style="text-align:center; margin-top:16px;">
    <a href="index.html">← Back to Home</a>
  </p>
</div>

<script>
const API = "https://fitness-tracker-system-production.up.railway.app";

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
  if(tab === 'register') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('registerForm').classList.add('active');
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('loginForm').classList.add('active');
  }
}

async function register() {
  const name = document.getElementById('reg_name').value;
  const email = document.getElementById('reg_email').value;
  const password = document.getElementById('reg_password').value;
  const msg = document.getElementById('reg_msg');

  if(!name || !email || !password) {
    msg.innerHTML = '<div class="msg error">Please fill all fields!</div>';
    return;
  }

  try {
    const res = await fetch(`${API}/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();
    if(res.ok) {
      msg.innerHTML = '<div class="msg success">✅ Registered! Redirecting...</div>';
      setTimeout(() => switchTab('login'), 1500);
    } else {
      msg.innerHTML = `<div class="msg error">❌ ${data.detail || 'Registration failed'}</div>`;
    }
  } catch(e) {
    msg.innerHTML = '<div class="msg error">❌ Cannot connect to server</div>';
  }
}

async function login() {
  const email = document.getElementById('login_email').value;
  const password = document.getElementById('login_password').value;
  const msg = document.getElementById('login_msg');

  try {
    const res = await fetch(`${API}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if(res.ok) {
      localStorage.setItem('token', data.access_token);
      msg.innerHTML = '<div class="msg success">✅ Login successful! Redirecting...</div>';
      setTimeout(() => window.location.href = 'dashboard.html', 1500);
    } else {
      msg.innerHTML = `<div class="msg error">❌ ${data.detail || 'Login failed'}</div>`;
    }
  } catch(e) {
    msg.innerHTML = '<div class="msg error">❌ Cannot connect to server</div>';
  }
}
</script>
</body>
</html>
